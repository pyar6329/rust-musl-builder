name: Docker Image CI

on: [push]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-musl-builder

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Rust version
        id: rust_version
        run: echo "version=$(tr -d '[:space:]' < rust-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github Docker Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test building container image
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v5
        with:
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            TOOLCHAIN=${{ steps.rust_version.outputs.version }}
          cache-from: |
            type=gha,scope=buildkit-${{ matrix.arch }}-${{ github.ref_name }}
            type=gha,scope=buildkit-${{ matrix.arch }}-main
          cache-to: type=gha,mode=max,compression=zstd,scope=buildkit-${{ matrix.arch }}-${{ github.ref_name }}
          file: ./Dockerfile

      - name: Build and push by digest
        if: startsWith(github.ref, 'refs/tags/')
        id: build
        uses: docker/build-push-action@v5
        with:
          platforms: ${{ matrix.platform }}
          build-args: |
            TOOLCHAIN=${{ steps.rust_version.outputs.version }}
          cache-from: |
            type=gha,scope=buildkit-${{ matrix.arch }}-${{ github.ref_name }}
            type=gha,scope=buildkit-${{ matrix.arch }}-main
          cache-to: type=gha,mode=max,compression=zstd,scope=buildkit-${{ matrix.arch }}-${{ github.ref_name }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          file: ./Dockerfile

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create manifest list
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Rust version
        id: rust_version
        run: echo "version=$(tr -d '[:space:]' < rust-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE_NAME}:${VERSION}-llvm-cov" \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.rust_version.outputs.version }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${VERSION}-llvm-cov"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.rust_version.outputs.version }}
